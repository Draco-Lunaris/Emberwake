# Release — builds the multi-arch image, generates an SBOM, pushes to GHCR, and signs the
# image with cosign (keyless / OIDC). Triggered by a v* tag. (Constitution Principle V.)
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless signing via OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/emberwake

jobs:
  build-sign-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Generate CycloneDX SBOM
        uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --override-filename emberwake.cdx
        continue-on-error: true

      - name: Attach SBOM to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            emberwake.cdx.json
          generate_release_notes: true
