# cargo-deny configuration — supply-chain gate (Constitution Principle II / V).
# Run: cargo deny check

[advisories]
# Fail on any security advisory affecting the dependency graph.
yanked = "deny"
# unmaintained / unsound surface as warnings until triaged, then promote to deny.
unmaintained = "workspace"

[licenses]
# Allow a conservative set of permissive licenses compatible with Apache-2.0 distribution.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
# Strong copyleft is not allowed to be linked into the distributed binary.
# (AGPL/GPL/LGPL absent from the allow-list => denied by default.)
confidence-threshold = 0.9

[bans]
# Catch duplicate/incompatible versions and risky patterns early.
multiple-versions = "warn"
wildcards = "deny"
# Disallow pulling in OpenSSL — the project is rustls-only (Principle II).
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
